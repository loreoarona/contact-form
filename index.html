<!DOCTYPE html>
<html lang="en">
<head>
  
    <meta charset="UTF-8">
 
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
    <title>CONTACT FORM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"> 
    <link rel="stylesheet" href="styles.css">
    <script src="script.js"></script>
    
</head>
<body>
    <form method="get" action="action_page.php" name="contactForm" onsubmit="return validateForm()">
        <fieldset>
            <div class="container">
            <div class="mb-3">
            <legend>Contact Information</legend>
            
            <label class="form-label">USERNAME:</label><br>
            <input type="text" id="username" name="username" class="form-control" required><br>
            </div>
            <div class="mb-3">
            <label class="form-label">EMAIL:</label><br>   
            <input type="email" id="email" name="email" class="form-control" required><br>
            </div>
            <div class="mb-3">
            <label class="form-label">TELEPHONE:</label><br>
            <input type="tel" id="telephone" name="telephone" class="form-control" required><br>
            </div>
            </div>
            <div class="container">
                <div class="mb-3">
        
                <h1>Select Job Position:</h1>
               
                <input type="checkbox" id="position1" name="position" value="position1">
                <label for="position1">Account Executive</label><br>

                <input type="checkbox" id="position2" name="position" value="position2">
                <label for="position2">Business Developer</label><br>

                <input type="checkbox" id="position3" name="position" value="position3">
                <label for="position3">Inside Sales</label><br>       

                <input type="checkbox" id="position4" name="position" value="position4">
                <label for="position4">Sales Manager</label><br>
               
                <input type="checkbox" id="position5" name="position" value="position5">
                <label for="position5">VP of Sales</label><br>
            </div>
            </div>

            <div class="container">
                <div class="mb-3">
                <h2>Select Job Position:</h2>
                <select id="position" name="position">
                    <option value="account_executive">Account Executive</option>
                    <option value="business_developer">Business Developer</option>
                    <option value="inside_sales">Inside Sales</option>
                    <option value="sales_manager">Sales Manager</option>
                    <option value="vp_of_sales">VP of Sales</option>    
                </select>
            </div><br>
                <h3>Willing to Relocate:</h3>
                <div class="mb-3">
                <input type="radio" id="relocate_yes" name="relocate" value="yes">
                <label for="relocate_yes">YES</label><br>
                </div>
                <button class="btn btn-primary" type="submit">Submit</button>
                <button class="btn btn-secondary" type="reset">Reset</button><br>
            </div>
        </fieldset>
    </form>
</body>
</html>
